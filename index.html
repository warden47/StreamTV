<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Stream TV</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Background overlay -->
  <div class="bg-overlay"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <img src="logo.png" alt="Stream TV" class="logo-img">
      <span class="site-name">Stream TV</span>
    </div>
    <div class="header-right">
      <button id="themeToggle" class="icon-btn" title="Switch theme"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" onclick="window.open('https://wa.link/s8bcwl','_blank')" title="WhatsApp"><i class="fab fa-whatsapp"></i></button>
      <button class="icon-btn" onclick="window.open('https://t.me/blackeye47','_blank')" title="Telegram"><i class="fab fa-telegram"></i></button>
    </div>
  </header>

  <!-- Navigation tabs -->
  <nav class="main-nav">
    <button class="nav-btn active" data-view="home"><i class="fas fa-home"></i> Home</button>
    <button class="nav-btn" data-view="search"><i class="fas fa-search"></i> Search</button>
    <button class="nav-btn" data-view="profile"><i class="fas fa-user"></i> Profile</button>
  </nav>

  <!-- Loading / status -->
  <div id="statusBanner" class="status-banner">
    <span id="statusText">Loading channels…</span>
  </div>

  <!-- Views -->
  <main id="mainContent">
    <!-- Home View -->
    <section class="view active" id="homeView">
      <div id="featuredCategories"></div>
    </section>

    <!-- Search View -->
    <section class="view" id="searchView">
      <div class="search-controls">
        <input type="text" id="searchBox" placeholder="Search channels..." class="search-input">
        <div class="category-pills" id="categoryPills"></div>
      </div>
      <div class="grid-container" id="channelGrid"></div>
      <div class="pagination" id="pagination"></div>
    </section>

    <!-- Profile View -->
    <section class="view" id="profileView">
      <div class="profile-container">
        <div class="profile-card">
          <img src="logo.png" alt="User" class="profile-avatar">
          <h2>Stream Viewer</h2>
          <p>Member since 2025</p>
          <div class="favorites-section">
            <h3><i class="fas fa-star"></i> Favorite Channels</h3>
            <div id="favList" class="fav-list">No favorites yet – click ♡ on any channel.</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Player Modal (VLC style) -->
  <div class="modal" id="playerModal">
    <div class="player-container">
      <div class="player-header">
        <span id="channelTitle">Channel Name</span>
        <div class="player-controls-top">
          <button id="qualityBtn" class="ctrl-btn">HD</button>
          <button id="closePlayer" class="ctrl-btn"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <video id="videoPlayer" class="video-js"></video>
      <div class="vlc-controls" id="vlcControls">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <div class="control-row">
          <button id="playPauseBtn" class="ctrl-btn"><i class="fas fa-play"></i></button>
          <span id="currentTime">0:00</span>
          <span class="time-separator">/</span>
          <span id="duration">0:00</span>
          <div class="spacer"></div>
          <button id="volumeBtn" class="ctrl-btn"><i class="fas fa-volume-up"></i></button>
          <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.05" value="1">
          <button id="fullscreenBtn" class="ctrl-btn"><i class="fas fa-expand"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="script.js"></script>
</body>
</html>
